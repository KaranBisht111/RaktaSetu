<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RaktaSetu – ICBMS</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --vibrant-red: #e11d48;
            --deep-red: #9f1239;
            --soft-red: #fff1f2;
            --text-dark: #0f172a;
            --text-slate: #475569;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #ffffff;
            color: var(--text-dark); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            margin: 0; 
        }

        .navbar { 
            background-color: #ffffff; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
            border-bottom: 4px solid var(--vibrant-red);
            padding: 1rem 2rem;
        }
        .navbar-brand { color: var(--vibrant-red) !important; font-weight: 800; font-size: 1.6rem; }
        .login-container { display: flex; justify-content: center; align-items: center; flex: 1; padding: 40px 15px; background: linear-gradient(180deg, var(--soft-red) 0%, #ffffff 100%); }
        .brand-header { text-align: center; margin-bottom: 35px; }
        .brand-header h2 { font-weight: 800; font-size: 2rem; margin-bottom: 5px; color: var(--text-dark); }
        .brand-header .system-name { color: var(--vibrant-red); font-size: 1.1rem; display: block; text-transform: uppercase; letter-spacing: 1px; }

        .card { 
            border-radius: 24px; 
            background-color: #ffffff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            border: 2px solid var(--soft-red); 
            animation: fadeIn 0.6s ease-out; 
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-header { 
            background-color: var(--vibrant-red); 
            color: #fff; 
            font-weight: 700; 
            text-align: center; 
            font-size: 1.1rem; 
            padding: 18px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-control { 
            border-radius: 12px; 
            background-color: var(--soft-red); 
            border: 1px solid var(--border-color); 
            color: var(--text-dark); 
            height: auto;
            padding: 12px 15px;
            font-size: 0.95rem;
        }
        .btn-danger { 
            border-radius: 12px; 
            background-color: var(--vibrant-red); 
            border: none; 
            font-weight: 700; 
            padding: 14px; 
            transition: 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        footer { background-color: var(--text-dark); color: #94a3b8; text-align: center; padding: 25px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid d-flex justify-content-between">
        <a class="navbar-brand" href="/">RAKTASETU</a>
        <div class="navbar-nav">
            <a class="nav-link font-weight-bold" href="register.html" style="color: var(--vibrant-red) !important;">CREATE ACCOUNT</a>
        </div>
    </div>
</nav>

<div class="login-container">
    <div class="card-wrapper">
        <div class="brand-header">
            <h2>RAKTASETU</h2>
            <span class="system-name font-weight-bold">Intelligent Centralized Blood Management System</span>
        </div>

        <div class="card">
            <div class="card-header">Secure Access Terminal</div>
            <div class="card-body p-4">
                <form id="loginForm">
                    <div class="form-group mb-3">
                        <label class="small font-weight-bold">Access Email</label>
                        <div class="input-group">
                            <input type="email" class="form-control" id="email" placeholder="id@gmail.com" required>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="small font-weight-bold">Secure Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                            <div class="input-group-append">
                                <span class="input-group-text password-toggle bg-white" id="password-toggle" style="cursor: pointer;"><i class="fas fa-eye"></i></span>
                            </div>
                        </div>
                    </div>

                    <div id="message-container"></div>
                    <p class="auth-status text-center small text-muted"><i class="fas fa-shield-alt mr-1 text-danger"></i> Cloud Authentication Active</p>
                    
                    <button type="submit" class="btn btn-danger btn-block btn-lg" id="login-btn">Authorize Entry</button>
                </form>
                <p class="text-center mt-4 mb-0 small text-muted">Request system access? <a href="register.html">Register Now</a></p>
            </div>
        </div>
    </div>
</div>

<footer>&copy; 2026 RaktaSetu – ICBMS. Secure Distributed Access Portal.</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="/firebase-config.js"></script>

<script>
$(document).ready(function() {
    const db = firebase.database();
    const loginForm = $('#loginForm');
    const loginBtn = $('#login-btn');
    const messageContainer = $('#message-container');

    // Password Toggle
    $('#password-toggle').on('click', function() {
        const passInput = $('#password');
        const icon = $(this).find('i');
        if (passInput.attr('type') === 'password') {
            passInput.attr('type', 'text');
            icon.removeClass('fa-eye').addClass('fa-eye-slash');
        } else {
            passInput.attr('type', 'password');
            icon.removeClass('fa-eye-slash').addClass('fa-eye');
        }
    });

    // Helper function for routing
    function routeUser(roleStr) {
        setTimeout(() => {
            const role = (roleStr || "").toLowerCase();
            if (role === 'admin') {
                window.location.href = "admin.html"; 
            } else if (role === 'hospital') {
                window.location.href = "hospital.html"; 
            } else if (role === 'bank') {
                window.location.href = "bank.html";
            } else if (role === 'donor') {
                window.location.href = "donor.html";
            } else {
                window.location.href = "index.html";
            }
        }, 1000);
    }

    // Handle Login
    loginForm.on('submit', async function(e) {
        e.preventDefault();
        
        const email = $('#email').val().trim();
        const password = $('#password').val();

        messageContainer.empty();
        loginBtn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Verifying...');

        try {
            // Step 1: Attempt Backend API Login first
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!response.ok) throw new Error("Backend Offline");
            
            const result = await response.json();

            // SAVE SESSION DATA
            localStorage.setItem('token', result.token);
            localStorage.setItem('role', result.role);
            localStorage.setItem('name', result.name);
            localStorage.setItem('user_id', result.user_id); 

            showMessage('Identity Verified. Syncing Node...', 'success');
            routeUser(result.role);

        } catch (error) {
            // Step 2: FALLBACK TO FIREBASE DIRECT AUTH (Crucial for Admin accounts created offline)
            firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                const user = userCredential.user;
                
                // Fetch specific role from Database
                db.ref("users/" + user.uid).once("value").then((snapshot) => {
                    let role = "donor"; // Safe default
                    let name = "User";

                    if (snapshot.exists()) {
                        role = snapshot.val().role;
                        name = snapshot.val().name || snapshot.val().full_name;
                    } 
                    
                    // ADMIN OVERRIDE: If DB read fails but email matches the official domain
                    if (email.endsWith('@raktasetu2026.com')) {
                        role = "admin";
                        name = "System Admin";
                    }

                    // Save session data locally
                    localStorage.setItem('token', user.uid); // Use UID as mock token
                    localStorage.setItem('role', role);
                    localStorage.setItem('name', name);
                    localStorage.setItem('user_id', user.uid);

                    showMessage('Cloud Identity Verified. Redirecting...', 'success');
                    routeUser(role);
                });
            })
            .catch((fbError) => {
                showMessage("Invalid Credentials or Node Offline.", 'danger');
                loginBtn.prop('disabled', false).html('Authorize Entry');
            });
        }
    });

    function showMessage(msg, type) {
        messageContainer.html(`<div class="alert alert-${type} py-2 small" role="alert">${msg}</div>`);
    }
});
</script>

</body>
</html>
